openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Saatvik Jain Aahar Gruh - Tiffin Service API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: categories
    description: Menu categories
  - name: products
    description: Menu items/products
  - name: cart
    description: Shopping cart
  - name: orders
    description: Orders
  - name: deliveryAreas
    description: Delivery areas
  - name: settings
    description: App settings
  - name: contact
    description: Contact messages
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # CATEGORIES
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List active categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      summary: Admin - list all categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [admin]
      summary: Admin - create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    put:
      operationId: updateCategory
      tags: [admin]
      summary: Admin - update category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryBody"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [admin]
      summary: Admin - soft delete category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # PRODUCTS
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List active products
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithCategory"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithCategory"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      summary: Admin - list all products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithCategory"
    post:
      operationId: createProduct
      tags: [admin]
      summary: Admin - create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithCategory"

  /admin/products/{id}:
    put:
      operationId: updateProduct
      tags: [admin]
      summary: Admin - update product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithCategory"
    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Admin - soft delete product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/products/{id}/toggle:
    patch:
      operationId: toggleProductStatus
      tags: [admin]
      summary: Admin - toggle product active/inactive
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithCategory"

  # CART
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current user's cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartWithItems"

  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartWithItems"

  /cart/items/{itemId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemBody"
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartWithItems"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartWithItems"

  /cart/clear:
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear entire cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ORDERS
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "400":
          description: Order blocked (maintenance/cutoff)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/my:
    get:
      operationId: listMyOrders
      tags: [orders]
      summary: List current user's orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderWithItems"

  /orders/track/{orderId}:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track order by ID (public)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTrack"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      summary: Admin - list all orders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderWithItems"

  /admin/orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [admin]
      summary: Admin - update order status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"

  # DELIVERY AREAS
  /delivery-areas:
    get:
      operationId: listDeliveryAreas
      tags: [deliveryAreas]
      summary: List active delivery areas
      responses:
        "200":
          description: Active delivery areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryArea"

  /admin/delivery-areas:
    get:
      operationId: adminListDeliveryAreas
      tags: [admin]
      summary: Admin - list all delivery areas
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All delivery areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryArea"
    post:
      operationId: createDeliveryArea
      tags: [admin]
      summary: Admin - create delivery area
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAreaBody"
      responses:
        "201":
          description: Delivery area created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryArea"

  /admin/delivery-areas/{id}:
    put:
      operationId: updateDeliveryArea
      tags: [admin]
      summary: Admin - update delivery area
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAreaBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryArea"
    delete:
      operationId: deleteDeliveryArea
      tags: [admin]
      summary: Admin - soft delete delivery area
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/delivery-areas/{id}/toggle:
    patch:
      operationId: toggleDeliveryArea
      tags: [admin]
      summary: Admin - toggle delivery area status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryArea"

  # SETTINGS
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings (public)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /admin/settings:
    put:
      operationId: updateSettings
      tags: [admin]
      summary: Admin - update settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # CONTACT
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactBody"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/contact:
    get:
      operationId: adminListContactMessages
      tags: [admin]
      summary: Admin - list contact messages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Contact messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"

  # ADMIN DASHBOARD
  /admin/dashboard:
    get:
      operationId: getDashboardStats
      tags: [admin]
      summary: Admin - get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /admin/dashboard/weekly-revenue:
    get:
      operationId: getWeeklyRevenue
      tags: [admin]
      summary: Admin - get weekly revenue chart data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Weekly revenue data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyRevenuePoint"

  /admin/dashboard/orders-by-category:
    get:
      operationId: getOrdersByCategory
      tags: [admin]
      summary: Admin - orders breakdown by category
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryOrderCount"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # AUTH
    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        phone:
          type: string
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
        status:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - status

    # CATEGORIES
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: integer
      required:
        - id
        - name
        - status

    CategoryBody:
      type: object
      properties:
        name:
          type: string
        status:
          type: integer
      required:
        - name

    # PRODUCTS
    ProductWithCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
        image_url:
          type: string
          nullable: true
        category_id:
          type: integer
          nullable: true
        category_name:
          type: string
          nullable: true
        is_special:
          type: boolean
        stock:
          type: integer
        status:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - is_special
        - stock
        - status

    ProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
        image_url:
          type: string
          nullable: true
        category_id:
          type: integer
          nullable: true
        is_special:
          type: boolean
        stock:
          type: integer
        status:
          type: integer
      required:
        - name
        - price
        - stock

    # CART
    CartItem:
      type: object
      properties:
        id:
          type: integer
        cart_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        status:
          type: integer
        product:
          $ref: "#/components/schemas/ProductWithCategory"
      required:
        - id
        - cart_id
        - product_id
        - quantity
        - status

    CartWithItems:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: string
      required:
        - id
        - user_id
        - items
        - subtotal

    AddToCartBody:
      type: object
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
      required:
        - product_id
        - quantity

    UpdateCartItemBody:
      type: object
      properties:
        quantity:
          type: integer
      required:
        - quantity

    # ORDERS
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        price:
          type: string
        product_name:
          type: string
          nullable: true
      required:
        - id
        - order_id
        - product_id
        - quantity
        - price

    OrderWithItems:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        customer_name:
          type: string
          nullable: true
        customer_phone:
          type: string
          nullable: true
        delivery_area_id:
          type: integer
          nullable: true
        delivery_area_name:
          type: string
          nullable: true
        delivery_charge:
          type: string
        subtotal:
          type: string
        total:
          type: string
        status:
          type: string
        payment_method:
          type: string
          nullable: true
        order_time:
          type: string
          format: date-time
        delivery_date:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - user_id
        - delivery_charge
        - subtotal
        - total
        - status
        - order_time
        - items

    OrderTrack:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        order_time:
          type: string
          format: date-time
        delivery_date:
          type: string
          nullable: true
        delivery_area_name:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: string
      required:
        - id
        - status
        - order_time
        - items
        - total

    CreateOrderBody:
      type: object
      properties:
        delivery_area_id:
          type: integer
        payment_method:
          type: string
      required:
        - delivery_area_id
        - payment_method

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # DELIVERY AREAS
    DeliveryArea:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        delivery_charge:
          type: string
        status:
          type: integer
      required:
        - id
        - name
        - delivery_charge
        - status

    DeliveryAreaBody:
      type: object
      properties:
        name:
          type: string
        delivery_charge:
          type: string
        status:
          type: integer
      required:
        - name
        - delivery_charge

    # SETTINGS
    Settings:
      type: object
      properties:
        id:
          type: integer
        order_cutoff_time:
          type: string
          nullable: true
        maintenance_mode:
          type: boolean
        announcement:
          type: string
          nullable: true
        business_name:
          type: string
          nullable: true
        contact_number:
          type: string
          nullable: true
        status:
          type: integer
      required:
        - id
        - maintenance_mode

    SettingsBody:
      type: object
      properties:
        order_cutoff_time:
          type: string
          nullable: true
        maintenance_mode:
          type: boolean
        announcement:
          type: string
          nullable: true
        business_name:
          type: string
          nullable: true
        contact_number:
          type: string
          nullable: true

    # CONTACT
    ContactBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        message:
          type: string
      required:
        - name
        - phone
        - message

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        message:
          type: string
        status:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - message
        - status

    # DASHBOARD
    DashboardStats:
      type: object
      properties:
        today_orders:
          type: integer
        pending_orders:
          type: integer
        delivered_today:
          type: integer
        revenue_today:
          type: string
        active_customers:
          type: integer
        menu_items:
          type: integer
        recent_orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderWithItems"
      required:
        - today_orders
        - pending_orders
        - delivered_today
        - revenue_today
        - active_customers
        - menu_items
        - recent_orders

    WeeklyRevenuePoint:
      type: object
      properties:
        day:
          type: string
        revenue:
          type: string
        orders:
          type: integer
      required:
        - day
        - revenue
        - orders

    CategoryOrderCount:
      type: object
      properties:
        category_name:
          type: string
        count:
          type: integer
        percentage:
          type: integer
      required:
        - category_name
        - count
        - percentage
